<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | Edu-Mitra</title>
  <meta name="description" content="Create your Edu-Mitra account as a Student, Teacher, or Admin." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Inter', sans-serif; }
    @keyframes fadeInUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
    @keyframes gradientShift { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
    .animate-fade-in { animation: fadeInUp 0.6s ease-out forwards; }
    .bg-animated {
      background: linear-gradient(-45deg,#0f172a,#1e3a5f,#1e40af,#0f172a);
      background-size:400% 400%;
      animation: gradientShift 10s ease infinite;
    }
    .glass { background:rgba(255,255,255,0.06);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.12); }
    .input-field {
      background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);
      color:white;transition:all 0.2s;
    }
    .input-field:focus { outline:none;border-color:#3b82f6;background:rgba(59,130,246,0.08);box-shadow:0 0 0 3px rgba(59,130,246,0.15); }
    .input-field::placeholder { color:#475569; }
    .input-field option { background:#1e293b;color:white; }
    .btn-register { background:linear-gradient(135deg,#2563eb,#1d4ed8);transition:all 0.3s; }
    .btn-register:hover { transform:translateY(-1px);box-shadow:0 8px 25px rgba(37,99,235,0.4); }
    .role-card { cursor:pointer;border:2px solid transparent;transition:all 0.2s; }
    .role-card.selected-student { border-color:#3b82f6;background:rgba(59,130,246,0.1); }
    .role-card.selected-teacher { border-color:#10b981;background:rgba(16,185,129,0.1); }
    .role-card.selected-admin   { border-color:#8b5cf6;background:rgba(139,92,246,0.1); }
    .strength-bar { height:4px;border-radius:2px;transition:all 0.3s; }
  </style>
</head>
<body class="bg-animated min-h-screen flex items-center justify-center p-4">
  <div class="absolute top-0 left-0 w-96 h-96 bg-blue-600/10 rounded-full blur-3xl -translate-x-1/2 -translate-y-1/2 pointer-events-none"></div>
  <div class="absolute bottom-0 right-0 w-96 h-96 bg-indigo-600/10 rounded-full blur-3xl translate-x-1/2 translate-y-1/2 pointer-events-none"></div>

  <div class="animate-fade-in w-full max-w-lg">
    <!-- Header -->
    <div class="text-center mb-6">
      <a href="index.html" class="inline-flex items-center gap-3 mb-4">
        <div class="w-10 h-10 bg-blue-500 rounded-xl flex items-center justify-center">
          <span class="text-white font-bold text-lg">E</span>
        </div>
        <span class="text-2xl font-black text-white">Edu<span class="text-blue-400">-Mitra</span></span>
      </a>
      <h1 class="text-2xl font-bold text-white">Create Account</h1>
      <p class="text-slate-400 text-sm mt-1">Join the academic intelligence platform</p>
    </div>

    <div class="glass rounded-2xl p-8">
      <!-- Role Selection -->
      <div class="mb-6">
        <label class="block text-sm font-medium text-slate-300 mb-3">I am a...</label>
        <div class="grid grid-cols-3 gap-3" id="roleCards">
          <div class="role-card selected-student glass rounded-xl p-3 text-center" onclick="selectRole('student')" id="card-student">
            <div class="text-2xl mb-1">🎓</div>
            <div class="text-xs font-semibold text-white">Student</div>
          </div>
          <div class="role-card glass rounded-xl p-3 text-center" onclick="selectRole('teacher')" id="card-teacher">
            <div class="text-2xl mb-1">👩‍🏫</div>
            <div class="text-xs font-semibold text-slate-400">Teacher</div>
          </div>
          <div class="role-card glass rounded-xl p-3 text-center" onclick="selectRole('admin')" id="card-admin">
            <div class="text-2xl mb-1">🛡️</div>
            <div class="text-xs font-semibold text-slate-400">Admin</div>
          </div>
        </div>
        <input type="hidden" id="regRole" value="student" />
      </div>

      <!-- Form -->
      <form id="registerForm" onsubmit="handleRegister(event)">
        <div class="grid grid-cols-2 gap-4 mb-4">
          <div>
            <label class="block text-xs font-medium text-slate-300 mb-2">Full Name</label>
            <input id="regName" type="text" required placeholder="Your full name"
              class="input-field w-full px-3 py-3 rounded-xl text-sm" />
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-300 mb-2">Department</label>
            <input id="regDept" type="text" placeholder="e.g. Computer Science"
              class="input-field w-full px-3 py-3 rounded-xl text-sm" />
          </div>
        </div>

        <div class="mb-4">
          <label class="block text-xs font-medium text-slate-300 mb-2">Email Address</label>
          <input id="regEmail" type="email" required placeholder="you@university.edu"
            class="input-field w-full px-4 py-3 rounded-xl text-sm" />
        </div>

        <div class="mb-4">
          <label class="block text-xs font-medium text-slate-300 mb-2">Password</label>
          <div class="relative">
            <input id="regPassword" type="password" required placeholder="Min. 6 characters"
              class="input-field w-full px-4 py-3 rounded-xl text-sm pr-12"
              oninput="updateStrength(this.value)" />
            <button type="button" onclick="togglePass('regPassword', this)"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white">👁</button>
          </div>
          <!-- Password strength bar -->
          <div class="mt-2 h-1 bg-white/10 rounded-full overflow-hidden">
            <div id="strengthBar" class="strength-bar bg-red-500" style="width:0%"></div>
          </div>
          <div id="strengthLabel" class="text-xs text-slate-500 mt-1">Enter a password</div>
        </div>

        <div class="mb-6">
          <label class="block text-xs font-medium text-slate-300 mb-2">Confirm Password</label>
          <input id="regConfirm" type="password" required placeholder="Repeat password"
            class="input-field w-full px-4 py-3 rounded-xl text-sm" />
        </div>

        <!-- Error / Success -->
        <div id="regError" class="hidden mb-4 px-4 py-3 bg-red-500/15 border border-red-500/30 rounded-xl text-red-400 text-sm"></div>
        <div id="regSuccess" class="hidden mb-4 px-4 py-3 bg-green-500/15 border border-green-500/30 rounded-xl text-green-400 text-sm"></div>

        <button type="submit" id="regBtn"
          class="btn-register w-full py-3.5 rounded-xl text-white font-semibold text-sm flex items-center justify-center gap-2">
          <span id="regBtnText">Create Account</span>
          <span id="regSpinner" class="hidden">
            <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
            </svg>
          </span>
        </button>
      </form>

      <p class="text-center text-sm text-slate-400 mt-6">
        Already have an account?
        <a href="login.html" class="text-blue-400 font-semibold hover:text-blue-300 ml-1">Sign In</a>
      </p>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    let selectedRole = 'student';

    function selectRole(role) {
      selectedRole = role;
      document.getElementById('regRole').value = role;
      const roles = ['student', 'teacher', 'admin'];
      const colorMap = { student: 'selected-student', teacher: 'selected-teacher', admin: 'selected-admin' };
      roles.forEach(r => {
        const card = document.getElementById(`card-${r}`);
        card.className = `role-card glass rounded-xl p-3 text-center ${r === role ? colorMap[r] : ''}`;
        card.querySelector('.text-xs').className = `text-xs font-semibold ${r === role ? 'text-white' : 'text-slate-400'}`;
      });
    }

    function togglePass(id, btn) {
      const inp = document.getElementById(id);
      inp.type = inp.type === 'password' ? 'text' : 'password';
      btn.textContent = inp.type === 'password' ? '👁' : '🙈';
    }

    function updateStrength(password) {
      const bar = document.getElementById('strengthBar');
      const label = document.getElementById('strengthLabel');
      let strength = 0;
      if (password.length >= 6) strength++;
      if (password.length >= 10) strength++;
      if (/[A-Z]/.test(password)) strength++;
      if (/[0-9]/.test(password)) strength++;
      if (/[^A-Za-z0-9]/.test(password)) strength++;
      const levels = [
        { pct:'0%',  color:'bg-slate-600', label:'Enter a password' },
        { pct:'20%', color:'bg-red-500',   label:'Very weak' },
        { pct:'40%', color:'bg-orange-500',label:'Weak' },
        { pct:'60%', color:'bg-yellow-500',label:'Fair' },
        { pct:'80%', color:'bg-blue-500',  label:'Strong' },
        { pct:'100%',color:'bg-green-500', label:'Very strong' },
      ];
      const lv = levels[strength] || levels[0];
      bar.style.width = lv.pct;
      bar.className = `strength-bar ${lv.color}`;
      label.textContent = lv.label;
      label.className = `text-xs mt-1 ${lv.color.replace('bg-','text-')}`;
    }

    async function handleRegister(e) {
      e.preventDefault();
      const name     = document.getElementById('regName').value.trim();
      const email    = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const confirm  = document.getElementById('regConfirm').value;
      const dept     = document.getElementById('regDept').value.trim();
      const role     = selectedRole;
      const errEl    = document.getElementById('regError');
      const okEl     = document.getElementById('regSuccess');
      const btn      = document.getElementById('regBtn');

      errEl.classList.add('hidden');
      okEl.classList.add('hidden');

      if (password !== confirm) {
        errEl.textContent = 'Passwords do not match.';
        errEl.classList.remove('hidden');
        return;
      }
      if (password.length < 6) {
        errEl.textContent = 'Password must be at least 6 characters.';
        errEl.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      document.getElementById('regSpinner').classList.remove('hidden');
      document.getElementById('regBtnText').textContent = 'Creating account...';

      try {
        const result = await authRegister({ name, email, password, role, department: dept });
        if (result.success) {
          const redirectMap = { student: 'student_dashboard.html', teacher: 'teacher_dashboard.html', admin: 'admin_dashboard.html' };
          const dashboard = redirectMap[role] || 'login.html';
          
          okEl.textContent = '✅ Account created! Redirecting to dashboard...';
          okEl.classList.remove('hidden');
          setTimeout(() => window.location.href = dashboard, 1500);
        } else {
          errEl.textContent = result.message || 'Registration failed.';
          errEl.classList.remove('hidden');
        }
      } catch (err) {
        // Detailed error reporting
        console.error("Registration Error:", err);
        errEl.textContent = `❌ Connection Error: ${err.message || "Could not reach the server. Make sure the backend is running at http://localhost:8000"}`;
        errEl.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        document.getElementById('regSpinner').classList.add('hidden');
        document.getElementById('regBtnText').textContent = 'Create Account';
      }
    }
  </script>
</body>
</html>
