<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | EduMitra</title>
  <meta name="description" content="Sign in to EduMitra as a Student, Teacher, or Admin." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Inter', sans-serif; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes gradientShift {
      0%,100% { background-position: 0% 50%; }
      50%      { background-position: 100% 50%; }
    }
    .animate-fade-in { animation: fadeInUp 0.6s ease-out forwards; }
    .bg-animated {
      background: linear-gradient(-45deg, #0f172a, #1e3a5f, #1e40af, #0f172a);
      background-size: 400% 400%;
      animation: gradientShift 10s ease infinite;
    }
    .glass {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.12);
    }
    .tab-active {
      background: #2563eb;
      color: white;
      box-shadow: 0 4px 15px rgba(37,99,235,0.4);
    }
    .tab-inactive {
      color: #94a3b8;
    }
    .tab-inactive:hover { color: white; background: rgba(255,255,255,0.08); }
    .input-field {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      color: white;
      transition: all 0.2s;
    }
    .input-field:focus {
      outline: none;
      border-color: #3b82f6;
      background: rgba(59,130,246,0.08);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }
    .input-field::placeholder { color: #475569; }
    .btn-login {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      transition: all 0.3s;
    }
    .btn-login:hover {
      background: linear-gradient(135deg, #1d4ed8, #1e40af);
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(37,99,235,0.4);
    }
    .btn-login:active { transform: translateY(0); }
    .error-msg { animation: fadeInUp 0.3s ease; }
    .blob1 { position:absolute;width:400px;height:400px;background:rgba(37,99,235,0.15);border-radius:50%;filter:blur(80px);top:-100px;left:-100px;pointer-events:none; }
    .blob2 { position:absolute;width:300px;height:300px;background:rgba(99,102,241,0.1);border-radius:50%;filter:blur(60px);bottom:-50px;right:-50px;pointer-events:none; }
  </style>
</head>
<body class="bg-animated min-h-screen flex items-center justify-center p-4">
  <div class="blob1"></div>
  <div class="blob2"></div>

  <div class="animate-fade-in w-full max-w-md">
    <!-- Logo / Header -->
    <div class="text-center mb-8">
      <a href="index.html" class="inline-flex items-center gap-3 mb-4">
        <div class="w-10 h-10 bg-blue-500 rounded-xl flex items-center justify-center">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 14l9-5-9-5-9 5 9 5z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/>
          </svg>
        </div>
        <span class="text-2xl font-black text-white">Edu<span class="text-blue-400">-Mitra</span></span>
      </a>
      <h1 class="text-2xl font-bold text-white">Welcome Back</h1>
      <p class="text-slate-400 text-sm mt-1">Sign in to your account</p>
    </div>

    <!-- Card -->
    <div class="glass rounded-2xl p-8">
      <!-- Role Tabs -->
      <div class="flex rounded-xl overflow-hidden bg-white/5 p-1 mb-8 gap-1" id="roleTabs">
        <button onclick="setRole('student')" id="tab-student"
          class="flex-1 py-2.5 text-sm font-semibold rounded-lg transition-all duration-200 tab-active" aria-label="Login as Student">
          🎓 Student
        </button>
        <button onclick="setRole('teacher')" id="tab-teacher"
          class="flex-1 py-2.5 text-sm font-semibold rounded-lg transition-all duration-200 tab-inactive" aria-label="Login as Teacher">
          👩‍🏫 Teacher
        </button>
        <button onclick="setRole('admin')" id="tab-admin"
          class="flex-1 py-2.5 text-sm font-semibold rounded-lg transition-all duration-200 tab-inactive" aria-label="Login as Admin">
          🛡️ Admin
        </button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" onsubmit="handleLogin(event)">
        <input type="hidden" id="selectedRole" value="student" />

        <!-- Email -->
        <div class="mb-4">
          <label class="block text-sm font-medium text-slate-300 mb-2">Email Address</label>
          <input id="loginEmail" type="email" required placeholder="you@university.edu"
            class="input-field w-full px-4 py-3 rounded-xl text-sm" autocomplete="email" />
        </div>

        <!-- Password -->
        <div class="mb-6">
          <label class="block text-sm font-medium text-slate-300 mb-2">Password</label>
          <div class="relative">
            <input id="loginPassword" type="password" required placeholder="••••••••"
              class="input-field w-full px-4 py-3 rounded-xl text-sm pr-12" autocomplete="current-password" />
            <button type="button" onclick="togglePassword('loginPassword', this)"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white transition-colors">
              👁
            </button>
          </div>
        </div>

        <!-- Error message -->
        <div id="loginError" class="hidden error-msg mb-4 px-4 py-3 bg-red-500/15 border border-red-500/30 rounded-xl text-red-400 text-sm"></div>

        <!-- Submit -->
        <button type="submit" id="loginBtn"
          class="btn-login w-full py-3.5 rounded-xl text-white font-semibold text-sm flex items-center justify-center gap-2">
          <span id="loginBtnText">Sign In</span>
          <span id="loginSpinner" class="hidden">
            <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
            </svg>
          </span>
        </button>
      </form>

      <!-- Divider -->
      <div class="my-6 flex items-center gap-3">
        <div class="flex-1 h-px bg-white/10"></div>
        <span class="text-slate-500 text-xs">OR</span>
        <div class="flex-1 h-px bg-white/10"></div>
      </div>

      <!-- Register link -->
      <p class="text-center text-sm text-slate-400">
        Don't have an account?
        <a href="register.html" class="text-blue-400 font-semibold hover:text-blue-300 transition-colors ml-1">
          Create Account
        </a>
      </p>
    </div>

    <!-- Demo Credentials hint -->
    <div class="mt-4 glass rounded-xl p-4 text-center">
      <p class="text-xs text-slate-500 mb-2 font-medium">Demo Mode (no backend)</p>
      <div class="flex justify-center gap-4 text-xs text-slate-400">
        <span>student@demo.com</span>
        <span class="text-slate-600">|</span>
        <span>password: demo123</span>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    // ── Read role from URL params ──────────────────────────────────────────
    const params = new URLSearchParams(window.location.search);
    const urlRole = params.get('role');
    if (urlRole && ['student', 'teacher', 'admin'].includes(urlRole)) {
      setRole(urlRole);
    }

    // ── Role tab switching ─────────────────────────────────────────────────
    function setRole(role) {
      document.getElementById('selectedRole').value = role;
      ['student', 'teacher', 'admin'].forEach(r => {
        const tab = document.getElementById(`tab-${r}`);
        tab.className = `flex-1 py-2.5 text-sm font-semibold rounded-lg transition-all duration-200 ${r === role ? 'tab-active' : 'tab-inactive'}`;
      });
    }

    // ── Toggle password visibility ────────────────────────────────────────
    function togglePassword(inputId, btn) {
      const inp = document.getElementById(inputId);
      inp.type = inp.type === 'password' ? 'text' : 'password';
      btn.textContent = inp.type === 'password' ? '👁' : '🙈';
    }

    // ── Handle Login ──────────────────────────────────────────────────────
    async function handleLogin(e) {
      e.preventDefault();
      const email    = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const role     = document.getElementById('selectedRole').value;
      const errEl    = document.getElementById('loginError');
      const btn      = document.getElementById('loginBtn');
      const spinner  = document.getElementById('loginSpinner');
      const btnText  = document.getElementById('loginBtnText');

      errEl.classList.add('hidden');
      btn.disabled = true;
      spinner.classList.remove('hidden');
      btnText.textContent = 'Signing in...';

      try {
        const result = await authLogin(email, password, role);
        if (result.success) {
          // Redirect based on role
          const redirectMap = {
            student : 'student_dashboard.html',
            teacher : 'teacher_dashboard.html',
            admin   : 'admin_dashboard.html',
          };
          window.location.href = redirectMap[result.role] || 'index.html';
        } else {
          errEl.textContent = result.message || 'Login failed. Please check your credentials.';
          errEl.classList.remove('hidden');
        }
      } catch (err) {
        errEl.textContent = 'Connection error. Running in demo mode.';
        errEl.classList.remove('hidden');
        // Demo mode fallback
        handleDemoLogin(email, password, role);
      } finally {
        btn.disabled = false;
        spinner.classList.add('hidden');
        btnText.textContent = 'Sign In';
      }
    }

    // ── Demo Login (offline fallback) ─────────────────────────────────────
    function handleDemoLogin(email, password, role) {
      const demoUsers = {
        'student@demo.com': { role: 'student', name: 'Alex Johnson', id: 'demo-student-1' },
        'teacher@demo.com': { role: 'teacher', name: 'Prof. Sarah Chen', id: 'demo-teacher-1' },
        'admin@demo.com':   { role: 'admin',   name: 'Admin User',    id: 'demo-admin-1' },
      };
      const user = demoUsers[email];
      if (user && (password === 'demo123' || password.length >= 6)) {
        localStorage.setItem('edu_token', 'demo-token-' + user.role);
        localStorage.setItem('edu_user', JSON.stringify({ ...user, email }));
        const redirectMap = { student: 'student_dashboard.html', teacher: 'teacher_dashboard.html', admin: 'admin_dashboard.html' };
        window.location.href = redirectMap[user.role];
      }
    }
  </script>
</body>
</html>
